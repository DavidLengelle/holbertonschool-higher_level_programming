<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <!-- Rend la page adaptable aux petits écrans (mobile) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lanceur de dés</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <h1>Lanceur de dés</h1>

    <!-- Liste des dés : une ligne par type de dé.
         Chaque ligne est générée par JavaScript dans #dice-list -->
    <section class="dice-list" id="dice-list"></section>

    <!-- Champ bonus / malus appliqué au total -->
    <div class="bonus-row">
      <label for="bonus">Bonus / malus</label>
      <input type="number" id="bonus" value="0" step="1">
    </div>

    <!-- Boutons d'action -->
    <div class="actions">
      <button id="roll-btn" class="btn-primary">Lancer</button>
      <button id="reset-btn" class="btn-secondary">Réinitialiser</button>
    </div>

    <!-- Affichage du résultat du lancer courant -->
    <section class="result" id="result" hidden>
      <div class="result-details" id="result-details"></div>
      <div class="result-total">
        Total : <span id="result-total">0</span>
      </div>
    </section>

    <!-- Historique des cinq derniers lancers -->
    <section class="history">
      <h2>Historique</h2>
      <ul id="history-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
